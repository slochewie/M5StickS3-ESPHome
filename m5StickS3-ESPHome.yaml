esphome:
  name: m5sticks3-unit-a
  friendly_name: M5StickS3 Unit A with Dual Button Unit

  includes:
    - <Wire.h>
    - <M5PM1.h>

  libraries:
    - Wire
    - M5PM1=git+https://github.com/m5stack/M5PM1.git#1.0.6
    - m5stack/M5Unified@^0.2.7
    - m5stack/M5GFX@^0.2.16

  platformio_options:
    board_build.partitions: partitions/default_8MB.csv
    board_build.arduino.memory_type: qio_opi
    build_flags:
      - -DESP32S3
      - -DBOARD_HAS_PSRAM
      - -mfix-esp32-psram-cache-issue
      - -DCORE_DEBUG_LEVEL=5
      - -DARDUINO_USB_CDC_ON_BOOT=1
      - -DARDUINO_USB_MODE=1

  on_boot:
    - priority: 900
      then:
        - lambda: |-
            static M5PM1 pm1;
            static bool pmic_ready = false;

            if (pmic_ready) {
              return;
            }

            Wire.begin(47, 48, 100000);
            delay(20);

            pm1.begin(&Wire, 0x6E, 47, 48, 100000);
            delay(20);

            pm1.setDcdcEnable(true);
            delay(20);
            pm1.setLdoEnable(true);
            delay(20);
            pm1.setChargeEnable(true);
            delay(20);
            pm1.setBoostEnable(true);
            delay(20);

            // L3B path for LCD/audio rail
            pm1.gpioSetFunc(M5PM1_GPIO_NUM_2, M5PM1_GPIO_FUNC_GPIO);
            pm1.gpioSetMode(M5PM1_GPIO_NUM_2, M5PM1_GPIO_MODE_OUTPUT);
            pm1.gpioSetDrive(M5PM1_GPIO_NUM_2, M5PM1_GPIO_DRIVE_PUSHPULL);
            pm1.gpioSetOutput(M5PM1_GPIO_NUM_2, false);
            delay(100);

            pmic_ready = true;
            ESP_LOGI("pm1", "PMIC init done: L2, L1, CHG, EXT_5V, L3B");

    - priority: -100
      then:
        - light.turn_on:
            id: backlight
            brightness: 15%
        - delay: 500ms
        - component.update: stick_display

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: arduino
    version: recommended

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "M5StickS3 Fallback"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

external_components:
  - source:
      type: local
      path: components

output:
  - platform: ledc
    pin: GPIO38
    id: lcd_backlight_raw
    frequency: 1000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "StickS3 Backlight"
    output: lcd_backlight_raw
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 24
  - file: "gfonts://Roboto"
    id: font_big
    size: 42

display:
  - platform: m5sticks3_display
    id: stick_display
    update_interval: 500ms
    lambda: |-
      it.fill(esphome::Color(0, 0, 0));

      it.printf(6, 18, id(font_small), esphome::Color(255, 255, 255), "Capacity Counter A");

      if (!isnan(id(capacity_counter_value).state)) {
        it.printf(6, 56, id(font_big), esphome::Color(255, 255, 0), "%.0f",
          id(capacity_counter_value).state);
      } else {
        it.printf(6, 56, id(font_big), esphome::Color(255, 128, 0), "--");
      }

binary_sensor:
  - platform: status
    id: sys_status
    name: "StickS3 Status"

  - platform: gpio
    id: key1
    name: "StickS3 Key1"
    pin:
      number: GPIO11
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

  - platform: gpio
    id: key2
    name: "StickS3 Key2"
    pin:
      number: GPIO12
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      - logger.log: "StickS3 Key2 pressed -> reset counter"
      - homeassistant.action:
          action: counter.reset
          data:
            entity_id: counter.capacity_counter

  - platform: gpio
    id: red_button
    name: "Dual Button Red"
    pin:
      number: GPIO9
      mode:
        input: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      - logger.log: "Dual Button RED pressed -> decrement counter"
      - homeassistant.action:
          action: counter.decrement
          data:
            entity_id: counter.capacity_counter

  - platform: gpio
    id: blue_button
    name: "Dual Button Blue"
    pin:
      number: GPIO10
      mode:
        input: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      - logger.log: "Dual Button BLUE pressed -> increment counter"
      - homeassistant.action:
          action: counter.increment
          data:
            entity_id: counter.capacity_counter

sensor:
  - platform: homeassistant
    id: capacity_counter_value
    entity_id: counter.capacity_counter
    internal: true

  - platform: uptime
    name: "StickS3 Uptime"

  - platform: wifi_signal
    id: wifi_rssi
    name: "StickS3 WiFi RSSI"
    update_interval: 60s
